<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="30" fill="#fefce8" stroke="#eab308" stroke-width="3"/>
  <!-- Sunburst rays -->
  <g transform="translate(32,30)">
    <line x1="0" y1="-18" x2="0" y2="-22" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12.7" y1="-12.7" x2="15.6" y2="-15.6" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="22" y2="0" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12.7" y1="12.7" x2="15.6" y2="15.6" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="22" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12.7" y1="12.7" x2="-15.6" y2="15.6" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="-22" y2="0" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12.7" y1="-12.7" x2="-15.6" y2="-15.6" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="7" y1="-16.5" x2="8.5" y2="-20" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="16.5" y1="-7" x2="20" y2="-8.5" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="16.5" y1="7" x2="20" y2="8.5" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="16.5" x2="8.5" y2="20" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="-7" y1="16.5" x2="-8.5" y2="20" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16.5" y1="7" x2="-20" y2="8.5" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16.5" y1="-7" x2="-20" y2="-8.5" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <line x1="-7" y1="-16.5" x2="-8.5" y2="-20" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
    <!-- Sun center -->
    <circle cx="0" cy="0" r="12" fill="#eab308"/>
    <circle cx="0" cy="0" r="9" fill="#fefce8" stroke="#eab308" stroke-width="0.5"/>
  </g>
  <!-- Number -->
  <text x="32" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a16207">365</text>
